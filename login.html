<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Ghost Access</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { border: 2px solid #00ff41; padding: 40px; text-align: center; background: rgba(0, 10, 0, 0.9); box-shadow: 0 0 30px #00ff41; border-radius: 15px; width: 300px; }
        input { background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 15px; width: 80%; text-align: center; font-size: 1.5em; outline: none; margin-bottom: 20px; letter-spacing: 5px; }
        button { background: #00ff41; color: #000; border: none; padding: 12px; cursor: pointer; font-weight: bold; width: 90%; transition: 0.3s; }
        button:hover { background: #000; color: #00ff41; box-shadow: 0 0 15px #00ff41; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>GHOST ACCESS</h1>
        <form method="POST" action="/">
            <input type="password" name="access_pwd" placeholder="****" maxlength="4" required autofocus>
            <br>
            <button type="submit">AUTENTICA</button>
        </form>
    </div>
</body>
</html>
