<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Ghost Access | Restricted</title>
    <style>
        /* Stile Dark & Matrix */
        body { 
            background: #000; 
            color: #00ff41; 
            font-family: 'Courier New', monospace; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }

        .login-box { 
            border: 2px solid #00ff41; 
            padding: 40px; 
            text-align: center; 
            background: rgba(0, 20, 0, 0.9); 
            box-shadow: 0 0 30px #00ff41; 
            border-radius: 15px;
            width: 300px;
        }

        h1 { font-size: 1.2em; letter-spacing: 3px; margin-bottom: 20px; }

        input { 
            background: #000; 
            border: 1px solid #00ff41; 
            color: #00ff41; 
            padding: 15px; 
            width: 80%; 
            text-align: center; 
            font-size: 1.5em; 
            outline: none; 
            margin-bottom: 20px;
            letter-spacing: 5px;
        }

        button { 
            background: #00ff41; 
            color: #000; 
            border: none; 
            padding: 12px 25px; 
            cursor: pointer; 
            font-weight: bold; 
            text-transform: uppercase; 
            transition: 0.3s;
            width: 90%;
        }

        button:hover { 
            background: #000; 
            color: #00ff41; 
            box-shadow: 0 0 15px #00ff41;
            transform: scale(1.05);
        }

        .error-msg { 
            color: #ff0000; 
            font-size: 0.8em; 
            margin-top: 15px; 
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h1>GHOST ACCESS</h1>
        <p style="font-size: 0.8em; color: #555;">SECURITY CHECK REQUIRED</p>
        
        <!-- Il form invia i dati alla rotta '/' di Python -->
        <form method="POST" action="/">
            <input type="password" name="access_pwd" placeholder="****" maxlength="4" required autofocus>
            <br>
            <button type="submit">AUTENTICA</button>
        </form>

        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}
    </div>

</body>
</html>
