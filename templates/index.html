<!DOCTYPE html>
<html lang="it">
<head>
    <title>Ghost Messenger | Matrix Edition</title>
    <style>
        body { 
            background-color: #000; 
            margin: 0; 
            overflow-x: hidden; 
            font-family: 'Courier New', monospace;
        }
        
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .main-container {
            position: relative;
            z-index: 1;
            padding: 30px 10px;
            text-align: center;
        }

        .title-header {
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #00ff41;
            display: inline-block;
            padding: 10px 40px;
            border-radius: 5px;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.5);
        }

        h1 { 
            color: #00ff41; 
            text-shadow: 0 0 8px #00ff41; 
            margin: 0;
            letter-spacing: 5px;
        }

        .box { 
            background: rgba(0, 0, 0, 0.9); 
            border: 2px solid #00ff41; 
            display: inline-block; 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 0 20px #00ff41; 
            margin: 15px; 
            width: 350px;
            vertical-align: top;
            min-height: 300px;
        }

        input { 
            background: #000; 
            border: 1px solid #00ff41; 
            color: #00ff41; 
            padding: 12px; 
            width: 90%; 
            outline: none; 
            margin-bottom: 15px;
            font-family: 'Courier New', monospace;
        }

        .file-input {
            font-size: 0.8em;
            margin-bottom: 10px;
        }

        button { 
            background: #00ff41; 
            color: #000; 
            border: none; 
            padding: 12px 25px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.3s;
            text-transform: uppercase;
            width: 100%;
        }

        button:hover { 
            background: #000; 
            color: #00ff41; 
            box-shadow: 0 0 15px #00ff41;
            border: 1px solid #00ff41;
        }

        .result { 
            word-break: break-all; 
            color: #ff00ea; 
            background: rgba(20, 20, 20, 0.95); 
            padding: 15px; 
            margin-top: 15px; 
            border: 1px solid #ff00ea; 
            font-size: 0.8em;
            box-shadow: 0 0 10px rgba(255, 0, 234, 0.3);
            max-height: 150px;
            overflow-y: auto;
        }

        h3 { margin-top: 0; color: #00ff41; font-size: 1.1em; border-bottom: 1px solid #00ff41; padding-bottom: 10px; }
        .divider { color: #555; margin: 10px 0; font-size: 0.8em; }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div class="main-container">
        <div class="title-header">
            <h1>GHOST MESSENGER 👻</h1>
        </div>

        <br>

        <!-- BOX 1: CRIPTA TESTO -->
        <div class="box">
            <h3>TESTO SEGRETO 📝</h3>
            <form action="/encrypt" method="post">
                <input type="text" name="message" placeholder="Scrivi messaggio..." required>
                <button type="submit">GENERA CODICE</button>
            </form>
            {% if encrypted and not is_file %}
                <div class="result">
                    <strong>CODICE ROSA:</strong><br>{{ encrypted }}
                </div>
            {% endif %}
        </div>

        <!-- BOX 2: CRIPTA IMMAGINE -->
        <div class="box">
            <h3>IMMAGINE SEGRETA 🖼️</h3>
            <form action="/encrypt_file" method="post" enctype="multipart/form-data">
                <p style="color: #0f0; font-size: 0.8em;">Seleziona una foto:</p>
                <input type="file" name="file" accept="image/*" class="file-input" required>
                <button type="submit" style="background: #008cff; color: white;">SCARICA FILE .GHOST</button>
            </form>
            <p style="color: #555; font-size: 0.7em; margin-top: 10px;">Riceverai un file criptato da inviare.</p>
        </div>

        <!-- BOX 3: DECRIPTA TUTTO -->
        <div class="box">
            <h3>LEGGI SEGRETO 🔓</h3>
            <form action="/decrypt" method="post" enctype="multipart/form-data">
                <input type="text" name="code" placeholder="Incolla codice rosa...">
                <div class="divider">-- OPPURE CARICA FILE --</div>
                <input type="file" name="file_to_decrypt" accept=".ghost" class="file-input">
                <button type="submit" style="background: #ff00ea; color: white;">SBLOCCA</button>
            </form>
            {% if decrypted %}
                <div class="result" style="color: #00ff41; border-color: #00ff41;">
                    <strong>MESSAGGIO:</strong><br>{{ decrypted }}
                </div>
            {% endif %}
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const characters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];
        for (let x = 0; x < columns; x++) drops[x] = 1;

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0";
            ctx.font = fontSize + "px arial";
            for (let i = 0; i < drops.length; i++) {
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 33);
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
