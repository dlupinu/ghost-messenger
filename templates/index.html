<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Ghost Messenger | Matrix Dark</title>
    <style>
        /* Sfondo e Atmosfera Dark */
        body { 
            background-color: #000; 
            margin: 0; 
            overflow-x: hidden; 
            font-family: 'Courier New', monospace; 
            color: #00ff41;
        }

        #matrix-canvas { 
            position: fixed; 
            top: 0; left: 0; 
            z-index: -1; 
            opacity: 0.8;
        }

        .main-container { 
            position: relative; 
            z-index: 1; 
            padding: 40px 20px; 
            text-align: center; 
        }

        .title-header { 
            background: rgba(0, 0, 0, 0.85); 
            border: 2px solid #00ff41; 
            display: inline-block; 
            padding: 15px 50px; 
            border-radius: 10px; 
            margin-bottom: 30px; 
            box-shadow: 0 0 20px #00ff41; 
        }

        h1 { margin: 0; letter-spacing: 8px; text-shadow: 0 0 10px #00ff41; font-size: 2em; }

        .box { 
            background: rgba(0, 5, 0, 0.95); 
            border: 1px solid #00ff41; 
            display: inline-block; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.3); 
            width: 500px; 
            max-width: 90%;
        }

        h3 { 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            margin-bottom: 25px; 
            border-bottom: 1px solid #1a1a1a; 
            padding-bottom: 10px; 
        }

        input, select { 
            background: #000; 
            border: 1px solid #00ff41; 
            color: #00ff41; 
            padding: 15px; 
            width: 90%; 
            outline: none; 
            margin-bottom: 20px; 
            font-family: 'Courier New', monospace; 
            font-size: 1em;
            box-shadow: inset 0 0 5px #00ff41;
        }

        /* Pulsanti Animati */
        button { 
            background: #00ff41; 
            color: #000; 
            border: none; 
            padding: 18px; 
            cursor: pointer; 
            font-weight: bold; 
            text-transform: uppercase; 
            width: 95%; 
            transition: all 0.3s ease; /* Animazione fluida */
            font-size: 1.1em;
            border-radius: 5px;
        }

        button:hover { 
            transform: scale(1.05); /* Si ingrandisce leggermente */
            background: #000; 
            color: #00ff41; 
            box-shadow: 0 0 25px #00ff41; 
            border: 2px solid #00ff41; 
        }

        button:active { 
            transform: scale(0.98); /* Si schiaccia leggermente al click */
        }

        .result { 
            word-break: break-all; 
            color: #ff00ea; 
            background: rgba(0, 0, 0, 0.9); 
            padding: 20px; 
            margin-top: 25px; 
            border: 1px dashed #ff00ea; 
            font-size: 1em; 
            box-shadow: 0 0 15px rgba(255, 0, 234, 0.4); 
        }

        .panic-btn { 
            position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; 
            background: #ff0000; color: white; border-radius: 50%; border: 3px solid #fff; 
            font-size: 0.7em; cursor: pointer; z-index: 100; transition: 0.3s;
        }
        .panic-btn:hover { transform: rotate(90deg) scale(1.2); }

        .divider { border: 0; border-top: 1px solid #1a1a1a; margin: 40px 0; }

        .ghost-pass {
            -webkit-text-security: disc !important;
            text-security: disc !important;
        }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>
    <button class="panic-btn" onclick="location.href='https://google.com'">PANIC</button>

    <div class="main-container">
        <div class="title-header">
            <h1>GHOST MESSENGER</h1>
        </div>

        <br>

        <div class="box">
            <!-- SEZIONE CRIPTA -->
            <h3>Cripta Messaggio 🔒</h3>
            <form action="/encrypt" method="post" autocomplete="off">
                <input type="text" name="message" placeholder="Scrivi il messaggio segreto..." required>
                <input type="text" name="psw" class="ghost-pass" placeholder="Imposta password di sblocco..." required>
                <select name="expiry">
                    <option value="1">Validità: 1 ORA</option>
                    <option value="24">Validità: 24 ORE</option>
                </select>
                <button type="submit">Genera Codice</button>
            </form>

            {% if encrypted %}
            <div class="result">
                <strong>CODICE GENERATO:</strong><br><br>
                <span id="target">{{ encrypted }}</span><br><br>
                <button onclick="copyIt()" style="padding: 10px; font-size: 0.8em; background: #ff00ea; color: white;">Copia Codice</button>
            </div>
            {% endif %}

            <div class="divider"></div>

            <!-- SEZIONE DECRIPTA -->
            <h3>Decripta Messaggio 🔓</h3>
            <form action="/decrypt" method="post" autocomplete="off">
                <input type="text" name="code" placeholder="Incolla codice rosa..." required>
                <input type="text" name="psw" class="ghost-pass" placeholder="Inserisci Password..." required>
                <button type="submit" style="background: #111; color: #00ff41; border: 1px solid #00ff41;">Sblocca Segreto</button>
            </form>

            {% if decrypted %}
            <div class="result" style="color: #00ff41; border-color: #00ff41; border-style: solid;">
                <strong>MESSAGGIO SBLOCCATO:</strong><br><br>
                {{ decrypted }}
            </div>
            {% endif %}
        </div>
    </div>

    <script>
        // Effetto Matrix
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const letters = "010101010101010101010101010101";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0";
            ctx.font = fontSize + "px arial";
            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 33);

        function copyIt() {
            const t = document.getElementById('target').innerText;
            navigator.clipboard.writeText(t);
            alert("Copiato!");
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
