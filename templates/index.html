<!DOCTYPE html>
<html lang="it">
<head>
    <title>Ghost Messenger | Matrix Edition</title>
    <style>
        body { 
            background-color: #000; 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Courier New', monospace;
        }
        
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .main-container {
            position: relative;
            z-index: 1;
            padding-top: 30px;
            text-align: center;
        }

        /* --- RETTANGOLO DIETRO IL TITOLO --- */
        .title-header {
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #00ff41;
            display: inline-block;
            padding: 10px 40px;
            border-radius: 5px;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.5);
        }

        h1 { 
            color: #00ff41; 
            text-shadow: 0 0 8px #00ff41; 
            margin: 0;
            letter-spacing: 5px;
        }

        /* --- BOX MESSAGGI --- */
        .box { 
            background: rgba(0, 0, 0, 0.9); 
            border: 2px solid #00ff41; 
            display: inline-block; 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 0 20px #00ff41; 
            margin: 15px; 
            width: 400px;
            vertical-align: top;
        }

        input { 
            background: #000; 
            border: 1px solid #00ff41; 
            color: #00ff41; 
            padding: 12px; 
            width: 85%; 
            outline: none; 
            margin-bottom: 15px;
            font-family: 'Courier New', monospace;
        }

        button { 
            background: #00ff41; 
            color: #000; 
            border: none; 
            padding: 12px 25px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover { 
            background: #000; 
            color: #00ff41; 
            box-shadow: 0 0 15px #00ff41;
            border: 1px solid #00ff41;
        }

        .result { 
            word-break: break-all; 
            color: #ff00ea; 
            background: rgba(20, 20, 20, 0.95); 
            padding: 15px; 
            margin-top: 15px; 
            border: 1px solid #ff00ea; 
            font-size: 0.9em;
            box-shadow: 0 0 10px rgba(255, 0, 234, 0.3);
        }

        h3 { margin-top: 0; color: #00ff41; font-size: 1.1em; }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div class="main-container">
        <!-- TITOLO CON RETTANGOLO DI PROTEZIONE -->
        <div class="title-header">
            <h1>GHOST MESSENGER 👻</h1>
        </div>

        <br>

        <div class="box">
            <h3>INVIA SEGRETO</h3>
            <form action="/encrypt" method="post">
                <input type="text" name="message" placeholder="Inserisci messaggio..." required>
                <br>
                <button type="submit">CRIPTA</button>
            </form>
            {% if encrypted %}
                <div class="result">
                    <strong>CODICE GENERATO:</strong><br>{{ encrypted }}
                </div>
            {% endif %}
        </div>

        <div class="box">
            <h3>LEGGI SEGRETO</h3>
            <form action="/decrypt" method="post">
                <input type="text" name="code" placeholder="Incolla codice rosa..." required>
                <br>
                <button type="submit" style="background: #ff00ea; color: white;">DECRIPTA</button>
            </form>
            {% if decrypted %}
                <div class="result" style="color: #00ff41; border-color: #00ff41;">
                    <strong>MESSAGGIO DECRIPTATO:</strong><br>{{ decrypted }}
                </div>
            {% endif %}
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const characters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()*&^%";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];

        for (let x = 0; x < columns; x++) {
            drops[x] = 1;
        }

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#0F0";
            ctx.font = fontSize + "px arial";

            for (let i = 0; i < drops.length; i++) {
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(draw, 33);
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
