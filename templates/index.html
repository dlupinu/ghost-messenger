<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Ghost Messenger</title>
    <style>
        body { background-color: #000; margin: 0; overflow: hidden; font-family: 'Courier New', monospace; color: #00ff41; }
        #matrix-canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        .main-container { position: relative; z-index: 1; padding: 20px; text-align: center; }
        
        /* Box rimpiccioliti */
        .box { 
            background: rgba(0, 5, 0, 0.9); 
            border: 1px solid #00ff41; 
            display: inline-block; 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2); 
            width: 380px; 
            max-width: 90%;
        }

        h1 { font-size: 1.5em; letter-spacing: 5px; text-shadow: 0 0 10px #00ff41; margin-bottom: 20px; }
        h3 { font-size: 1em; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; }

        input, select { 
            background: #000; border: 1px solid #00ff41; color: #00ff41; 
            padding: 10px; width: 85%; outline: none; margin-bottom: 15px; 
            font-family: 'Courier New', monospace; font-size: 0.9em;
        }

        /* Pulsanti con animazione ingrandimento */
        button { 
            background: #00ff41; color: #000; border: none; padding: 12px; 
            cursor: pointer; font-weight: bold; text-transform: uppercase; 
            width: 90%; transition: transform 0.3s ease, box-shadow 0.3s ease; 
            border-radius: 5px;
        }
        button:hover { transform: scale(1.08); box-shadow: 0 0 20px #00ff41; }
        button:active { transform: scale(0.95); }

        .result { word-break: break-all; color: #ff00ea; font-size: 0.8em; margin-top: 15px; padding: 10px; border: 1px dashed #ff00ea; }
        .divider { border: 0; border-top: 1px solid #222; margin: 25px 0; }
        .ghost-pass { -webkit-text-security: disc; text-security: disc; }

        /* Crash Screen */
        #crash-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #ff0000; z-index: 9999; text-align: center; padding-top: 20%; }
        .alert-icon { font-size: 80px; animation: blink 0.8s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <canvas id="matrix-canvas"></canvas>

    <div id="crash-screen">
        <div class="alert-icon">⚠️</div>
        <h1>IL TUO TEMPO È SCADUTO</h1>
        <p>Autodistruzione sessione in corso...</p>
    </div>

    <div class="main-container">
        <h1>GHOST MESSENGER</h1>
        <div class="box">
            <h3>Cripta Messaggio 🔒</h3>
            <form action="/encrypt" method="post" autocomplete="off">
                <input type="text" name="message" placeholder="Segreto..." required>
                <input type="text" name="psw" class="ghost-pass" placeholder="Password sblocco..." required>
                <select name="expiry">
                    <option value="1">Scadenza: 1 Ora</option>
                    <option value="24">Scadenza: 24 Ore</option>
                </select>
                <button type="submit">Genera Codice</button>
            </form>
            {% if encrypted %}
                <div class="result">{{ encrypted }}</div>
            {% endif %}

            <div class="divider"></div>

            <h3>Decripta Messaggio 🔓</h3>
            <form action="/decrypt" method="post" autocomplete="off">
                <input type="text" name="code" placeholder="Incolla codice..." required>
                <input type="text" name="psw" class="ghost-pass" placeholder="Password..." required>
                <button type="submit" style="background: #111; color: #00ff41; border: 1px solid #00ff41;">Sblocca Segreto</button>
            </form>
            {% if decrypted %}
                <div class="result" style="color:#00ff41; border-color:#00ff41;">{{ decrypted }}</div>
            {% endif %}
        </div>
    </div>

    <script>
        // Matrix Effect
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width/16)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0"; ctx.font = "16px arial";
            drops.forEach((y, i) => {
                ctx.fillText(Math.floor(Math.random()*2), i*16, y*16);
                if (y*16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 33);

        // Crash Timer (1 minuto)
        setTimeout(() => {
            document.querySelector('.main-container').style.display = 'none';
            document.getElementById('crash-screen').style.display = 'block';
            setTimeout(() => { window.location.href = "https://www.google.com"; }, 5000);
        }, 60000);
    </script>
</body>
</html>
