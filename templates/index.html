<div class="main-container">
    <div class="title-header"><h1>GHOST MESSENGER</h1></div>
    <br>
    <div class="box">
        <!-- CRIPTA -->
        <h3>CRIPTA MESSAGGIO 🔒</h3>
        <form action="/encrypt" method="post" autocomplete="off">
            <input type="text" name="message" placeholder="Messaggio segreto..." required>
            
            <span style="color:#888; font-size:0.8em; display:block; text-align:left; margin-left:20px;">Password di sblocco:</span>
            <input type="text" name="psw" class="ghost-pass" placeholder="Password..." required>
            
            <span style="color:#888; font-size:0.8em; display:block; text-align:left; margin-left:20px;">Durata messaggio:</span>
            <select name="expiry">
                <option value="1">Scade tra 1 ORA</option>
                <option value="24">Scade tra 24 ORE</option>
            </select>
            
            <button type="submit">GENERA CODICE</button>
        </form>

        {% if encrypted %}
        <div class="result">
            <span id="copyTarget">{{ encrypted }}</span><br>
            <button type="button" class="copy-btn" onclick="copyText()">📑 COPIA</button>
        </div>
        {% endif %}

        <div class="divider"></div>

        <!-- DECRIPTA -->
        <h3>SBLOCCA CODICE 🔓</h3>
        <form action="/decrypt" method="post" autocomplete="off">
            <input type="text" name="code" placeholder="Incolla il codice rosa..." required>
            <input type="text" name="psw" class="ghost-pass" placeholder="Inserisci Password..." required>
            <button type="submit" style="background: #333; color: #00ff41; border: 1px solid #00ff41;">LEGGI SEGRETO</button>
        </form>

        {% if decrypted %}
        <div class="result" style="color: #00ff41; border-color: #00ff41;">
            <strong>RISULTATO:</strong><br>{{ decrypted }}
        </div>
        {% endif %}
    </div>
</div>
