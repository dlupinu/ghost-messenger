<div class="main-container">
    <div class="title-header"><h1>GHOST MESSENGER 👻</h1></div>

    <!-- SEZIONE 1: SOLO TESTO (VERDE) -->
    <div class="box" style="border-color: #00ff41;">
        <h3 style="color: #00ff41;">MESSAGGI DI TESTO 📝</h3>
        
        <!-- Cripta -->
        <form action="/text_encrypt" method="post">
            <input type="text" name="message" placeholder="Messaggio da nascondere..." required>
            <button type="submit">GENERA CODICE ROSA</button>
        </form>
        {% if encrypted_text %}
            <div class="result">
                <span id="copyTarget">{{ encrypted_text }}</span><br>
                <button type="button" class="copy-btn" onclick="copyText()">📑 COPIA</button>
            </div>
        {% endif %}

        <hr style="border: 0.5px solid #333; margin: 20px 0;">

        <!-- Decripta -->
        <form action="/text_decrypt" method="post">
            <input type="text" name="code" placeholder="Incolla codice rosa...">
            <button type="submit" style="background: #555; color: white;">LEGGI TESTO</button>
        </form>
        {% if decrypted_text %}
            <div class="result" style="color: #00ff41;">{{ decrypted_text }}</div>
        {% endif %}
    </div>

    <!-- SEZIONE 2: SOLO IMMAGINI (BLU) -->
    <div class="box" style="border-color: #008cff;">
        <h3 style="color: #008cff;">IMMAGINI GHOST 🖼️</h3>
        
        <!-- Nascondi -->
        <form action="/img_hide" method="post" enctype="multipart/form-data">
            <span class="label-mini">Foto normale:</span>
            <input type="file" name="cover_img" accept="image/*" required>
            <input type="text" name="hidden_msg" placeholder="Messaggio segreto...">
            <input type="text" name="psw" class="ghost-pass" placeholder="Password immagine...">
            <button type="submit" style="background: #008cff; color: white;">CREA FOTO GHOST</button>
        </form>

        <hr style="border: 0.5px solid #333; margin: 20px 0;">

        <!-- Estrai -->
        <form action="/img_reveal" method="post" enctype="multipart/form-data">
            <span class="label-mini">Carica Foto Ghost:</span>
            <input type="file" name="ghost_img" accept="image/png" required>
            <input type="text" name="psw" class="ghost-pass" placeholder="Password sblocco...">
            <button type="submit" style="background: #ff00ea; color: white;">ESTRAI SEGRETO</button>
        </form>
        {% if decrypted_img %}
            <div class="result" style="color: #00ff41;">{{ decrypted_img }}</div>
        {% endif %}
    </div>
</div>

<script>
function copyText() {
    const text = document.getElementById("copyTarget").innerText;
    navigator.clipboard.writeText(text);
    alert("Copiato!");
}
// ... (Tieni il codice del Matrix) ...
</script>
