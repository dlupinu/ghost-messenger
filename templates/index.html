<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Messenger</title>
    <style>
        body { 
            background-color: #000; 
            margin: 0; 
            overflow-x: hidden; 
            font-family: 'Courier New', monospace; 
            color: #00ff41; 
        }
        
        #matrix-canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        /* Contenitore centrato verticalmente e orizzontalmente */
        .main-container { 
            position: relative; 
            z-index: 1; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 { 
            font-size: 3em; 
            letter-spacing: 10px; 
            text-shadow: 0 0 20px #00ff41; 
            margin-bottom: 50px; 
            text-align: center;
        }

        /* Flexwrapper che cambia direzione su mobile */
        .flex-wrapper { 
            display: flex; 
            justify-content: center; 
            gap: 40px; 
            width: 100%;
            max-width: 1200px;
        }

        .box { 
            background: rgba(0, 5, 0, 0.95); 
            border: 2px solid #00ff41; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.3); 
            width: 450px; 
            box-sizing: border-box;
        }

        h3 { font-size: 1.2em; margin-bottom: 25px; color: #fff; text-transform: uppercase; letter-spacing: 2px; }

        /* Input e select molto più grandi */
        input, select { 
            background: #000; 
            border: 1px solid #00ff41; 
            color: #00ff41; 
            padding: 15px; 
            width: 100%; 
            outline: none; 
            margin-bottom: 20px; 
            font-size: 1.1em; 
            box-sizing: border-box;
        }

        button { 
            background: #00ff41; 
            color: #000; 
            border: none; 
            padding: 18px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%; 
            font-size: 1.2em;
            transition: 0.3s; 
            border-radius: 5px; 
            text-transform: uppercase;
        }
        
        button:hover { background: #00cc33; transform: scale(1.02); box-shadow: 0 0 20px #00ff41; }

        .btn-small { background: #1a1a1a; color: #00ff41; font-size: 0.9em; width: auto; padding: 10px 20px; border: 1px solid #00ff41; margin-top: 15px; }

        .result { 
            word-break: break-all; 
            color: #ff00ea; 
            font-size: 1.1em; 
            margin-top: 20px; 
            padding: 15px; 
            border: 1px dashed #ff00ea; 
            background: rgba(20,0,20,0.6); 
        }
        
        .ghost-input { display: none !important; }

        /* ADATTAMENTO PER SMARTPHONE */
        @media (max-width: 900px) {
            h1 { font-size: 2em; letter-spacing: 5px; }
            .flex-wrapper { 
                flex-direction: column; 
                align-items: center; 
                gap: 30px;
            }
            .box { 
                width: 100%; 
                max-width: 400px;
                padding: 25px;
            }
            .main-container { justify-content: flex-start; padding-top: 40px; }
        }

        /* Virus Alert Style */
        .virus-alert { position: fixed; width: 250px; height: 150px; background: #ccc; border: 2px solid #000; color: #000; padding: 10px; box-shadow: 5px 5px 0px #444; z-index: 10000; display: none; font-family: "Tahoma", "Arial", sans-serif; }
        .virus-header { background: #000080; color: white; padding: 2px 5px; font-weight: bold; font-size: 12px; margin: -10px -10px 10px -10px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <canvas id="matrix-canvas"></canvas>

    <div class="main-container">
        <h1>GHOST MESSENGER</h1>
        
        <div class="flex-wrapper">
            <!-- BOX CRIPTAZIONE -->
            <div class="box">
                <h3>LOCK MESSAGE 🔒</h3>
                <form action="/encrypt" method="post" autocomplete="off">
                    <input type="text" class="ghost-input" name="fake_user">
                    <input type="password" class="ghost-input" name="fake_pass">
                    
                    <input type="text" name="message" placeholder="Messaggio segreto..." required autocomplete="off">
                    
                    <input type="text" name="psw" placeholder="Password sblocco..." required 
                           autocomplete="one-time-code"
                           onfocus="this.type='password'; this.removeAttribute('readonly');" 
                           readonly>
                    
                    <select name="expiry">
                        <option value="1">Scadenza: 1 Ora</option>
                        <option value="24">Scadenza: 24 Ore</option>
                    </select>
                    <button type="submit">GENERA CODICE</button>
                </form>
                {% if encrypted %}
                    <div class="result" id="res-enc">{{ encrypted }}</div>
                    <button class="btn-small" onclick="copyText('res-enc')">📋 COPIA CODICE</button>
                {% endif %}
            </div>

            <!-- BOX DECRIPTAZIONE -->
            <div class="box">
                <h3>UNLOCK MESSAGE 🔓</h3>
                <form action="/decrypt" method="post" autocomplete="off">
                    <input type="text" class="ghost-input" name="user_temp">
                    <input type="password" class="ghost-input" name="fake_pass_2">

                    <input type="text" id="input-decrypt" name="code" placeholder="Incolla codice qui..." required autocomplete="off">
                    
                    <input type="text" name="psw" placeholder="Password..." required 
                           autocomplete="one-time-code"
                           onfocus="this.type='password'; this.removeAttribute('readonly');" 
                           readonly>
                    
                    <button type="submit" style="background:#111; color:#00ff41; border:2px solid #00ff41;">SBLOCCA</button>
                    <button class="btn-small" type="button" onclick="pasteText()" style="width:100%">📥 INCOLLA</button>
                </form>
                {% if decrypted %}
                    <div class="result" style="color:#00ff41; border-color:#00ff41;">{{ decrypted }}</div>
                {% endif %}
            </div>
        </div>
    </div>

    <script>
        function copyText(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.target;
                btn.innerText = "✅ COPIATO!";
                setTimeout(() => { btn.innerText = "📋 COPIA CODICE"; }, 2000);
            });
        }

        async function pasteText() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('input-decrypt').value = text;
            } catch (err) {
                alert("Permesso negato. Incolla manualmente.");
            }
        }

        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const drops = Array(Math.floor(canvas.width/16)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0"; ctx.font = "16px arial";
            drops.forEach((y, i) => {
                ctx.fillText(Math.floor(Math.random()*2), i*16, y*16);
                if (y*16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 33);

        function triggerVirus() {
            document.querySelector('.main-container').style.filter = 'blur(5px)';
            let count = 0;
            const interval = setInterval(() => {
                if(count > 50) {
                    clearInterval(interval);
                    setTimeout(() => { window.location.href = "https://www.google.com"; }, 1500);
                    return;
                }
                const win = document.createElement('div');
                win.className = 'virus-alert';
                win.style.display = 'block';
                win.style.left = Math.random() * (window.innerWidth - 250) + 'px';
                win.style.top = Math.random() * (window.innerHeight - 150) + 'px';
                win.innerHTML = `<div class="virus-header"><span>System Error</span><span>X</span></div>
                                 <p style="text-align:center; margin-top:20px;">⚠️<br><b>ACCESSO SCADUTO</b></p>`;
                document.body.appendChild(win);
                count++;
            }, 100);
        }
        setTimeout(triggerVirus, 60000);
    </script>
</body>
</html>
