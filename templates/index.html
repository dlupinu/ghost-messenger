<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Messenger</title>
    <style>
        body { 
            background-color: #000; 
            margin: 0; 
            overflow-x: hidden; 
            font-family: 'Courier New', monospace; 
            color: #00ff41; 
            /* Sfondo Anonymous corretto */
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://wallpaperaccess.com/full/11252.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
        
        #matrix-canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.6; }

        .main-container { 
            position: relative; 
            z-index: 1; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .header-box {
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #00ff41;
            padding: 20px 50px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 50px;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.6);
        }

        .hacker-icon {
            font-size: 3em;
            filter: drop-shadow(0 0 10px #00ff41);
        }

        h1 { 
            font-size: 3.2em; 
            letter-spacing: 12px; 
            text-shadow: 0 0 20px #00ff41; 
            margin: 0;
            text-align: center;
        }

        .flex-wrapper { 
            display: flex; 
            justify-content: center; 
            gap: 40px; 
            width: 100%;
            max-width: 1100px;
        }

        .box { 
            background: rgba(0, 15, 0, 0.95); 
            border: 2px solid #00ff41; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 0 40px rgba(0, 255, 65, 0.2); 
            width: 450px; 
            box-sizing: border-box;
        }

        h3 { font-size: 1.2em; margin-bottom: 25px; color: #fff; text-transform: uppercase; letter-spacing: 2px; }

        input, select { 
            background: #000; 
            border: 1px solid #00ff41; 
            color: #00ff41; 
            padding: 15px; 
            width: 100%; 
            outline: none; 
            margin-bottom: 20px; 
            font-size: 1.1em; 
            box-sizing: border-box;
        }

        button { 
            background: #00ff41; 
            color: #000; 
            border: none; 
            padding: 18px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%; 
            font-size: 1.2em;
            transition: 0.3s; 
            border-radius: 8px; 
            text-transform: uppercase;
        }
        
        button:hover { background: #00cc33; transform: scale(1.02); box-shadow: 0 0 25px #00ff41; }

        .btn-small { background: #1a1a1a; color: #00ff41; font-size: 0.9em; width: auto; padding: 10px 20px; border: 1px solid #00ff41; margin-top: 15px; }

        .result { 
            word-break: break-all; 
            color: #ff00ea; 
            font-size: 1.1em; 
            margin-top: 20px; 
            padding: 15px; 
            border: 1px dashed #ff00ea; 
            background: rgba(40,0,40,0.4); 
        }

        .virus-alert { position: fixed; width: 250px; height: 150px; background: #ccc; border: 2px solid #000; color: #000; padding: 10px; box-shadow: 5px 5px 0px #444; z-index: 10000; display: none; font-family: "Tahoma", sans-serif; }
        .virus-header { background: #000080; color: white; padding: 2px 5px; font-weight: bold; font-size: 12px; margin: -10px -10px 10px -10px; display: flex; justify-content: space-between; }

        @media (max-width: 900px) {
            h1 { font-size: 1.8em; letter-spacing: 4px; }
            .header-box { padding: 15px 20px; gap: 10px; }
            .flex-wrapper { flex-direction: column; align-items: center; }
            .box { width: 100%; }
        }
    </style>
</head>
<body>
    <canvas id="matrix-canvas"></canvas>

    <!-- Audio Allarme -->
    <audio id="alarm-sound" src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" preload="auto" loop></audio>

    <div class="main-container">
        <!-- HEADER SOLO CON TESCHI -->
        <div class="header-box">
            <span class="hacker-icon">💀</span>
            <h1>GHOST MESSENGER</h1>
            <span class="hacker-icon">💀</span>
        </div>
        
        <div class="flex-wrapper">
            <div class="box">
                <h3>LOCK MESSAGE 🔒</h3>
                <form action="/encrypt" method="post" autocomplete="off">
                    <input type="text" name="message" placeholder="Messaggio segreto..." required autocomplete="off">
                    <input type="text" name="psw" placeholder="Password sblocco..." required 
                           onfocus="this.type='password'; this.removeAttribute('readonly');" readonly>
                    <select name="expiry">
                        <option value="1">Scadenza: 1 Ora</option>
                        <option value="24">Scadenza: 24 Ore</option>
                    </select>
                    <button type="submit">GENERA CODICE</button>
                </form>
            </div>

            <div class="box">
                <h3>UNLOCK MESSAGE 🔓</h3>
                <form action="/decrypt" method="post" autocomplete="off">
                    <input type="text" id="input-decrypt" name="code" placeholder="Incolla codice qui..." required autocomplete="off">
                    <input type="text" name="psw" placeholder="Password..." required 
                           onfocus="this.type='password'; this.removeAttribute('readonly');" readonly>
                    <button type="submit" style="background:#111; color:#00ff41; border:2px solid #00ff41;">SBLOCCA</button>
                    <button class="btn-small" type="button" onclick="pasteText()" style="width:100%">📥 INCOLLA</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Matrix Effect
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        const drops = Array(Math.floor(canvas.width/16)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.08)"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0"; 
            ctx.font = "16px arial";
            drops.forEach((y, i) => {
                ctx.fillText(Math.floor(Math.random()*2), i*16, y*16);
                if (y*16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 35);

        // Clipboard
        async function pasteText() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('input-decrypt').value = text;
            } catch (err) { alert("Incolla manualmente."); }
        }

        // TRIGGER VIRUS + ALLARME
        function triggerVirus() {
            const alarm = document.getElementById('alarm-sound');
            alarm.play().catch(e => console.log("Audio bloccato. Clicca sulla pagina per permettere i suoni."));
            
            document.querySelector('.main-container').style.filter = 'blur(6px)';
            let count = 0;
            const interval = setInterval(() => {
                if(count > 45) {
                    clearInterval(interval);
                    setTimeout(() => { window.location.href = "https://www.google.com"; }, 2000);
                    return;
                }
                const win = document.createElement('div');
                win.className = 'virus-alert';
                win.style.display = 'block';
                win.style.left = Math.random() * (window.innerWidth - 250) + 'px';
                win.style.top = Math.random() * (window.innerHeight - 150) + 'px';
                win.innerHTML = `<div class="virus-header"><span>Critical System Failure</span><span>X</span></div>
                                 <p style="text-align:center; margin-top:20px;">⚠️<br><b>ACCESSO NON AUTORIZZATO</b></p>`;
                document.body.appendChild(win);
                count++;
            }, 100);
        }
        
        setTimeout(triggerVirus, 60000);
    </script>
</body>
</html>
